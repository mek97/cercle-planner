name: Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please don't use this
        form for security issues — see [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to see, and what did you see instead?
      placeholder: I clicked X and Y happened, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: e.g. Chrome 131 on macOS 15, Safari on iOS 18
    validations:
      required: true
  - type: input
    id: viewport
    attributes:
      label: Viewport width (for visual bugs)
      placeholder: e.g. 320px, 768px, 1440px
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
      description: Drag images or video clips here. Especially helpful for visual bugs.
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Any errors from the browser DevTools console.
      render: text
