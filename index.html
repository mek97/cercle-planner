<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a14" />
    <meta name="description" content="Fan-made interactive planner for Cercle Festival 2026 — vibe quiz, full timetable, Spotify previews, shareable picks. Not affiliated with Cercle." />
    <!-- GitHub Pages can't serve HTTP response headers, so the CSP and friends
         from vercel.json / public/_headers move into meta. Note: X-Frame-Options
         and HSTS can't be set via meta — accept that trade-off on GH Pages. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://image-cdn-ak.spotifycdn.com https://image-cdn-fa.spotifycdn.com https://i.scdn.co; frame-src https://open.spotify.com; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Cercle Festival 2026 · Planner</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #06050d;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 30% 22%, rgba(255, 93, 138, 0.16), transparent 32%),
          radial-gradient(circle at 72% 62%, rgba(177, 140, 255, 0.14), transparent 34%),
          #06050d;
        color: #faf6ec;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      #boot-loader.boot-loader--hide {
        opacity: 0;
        visibility: hidden;
      }

      .boot-loader__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        transform: translateY(-3vh);
      }

      .boot-loader__mark {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: conic-gradient(from 180deg, #ffb86b, #ff5d8a, #b18cff, #4dd2ff, #ffb86b);
        box-shadow: 0 0 28px rgba(255, 93, 138, 0.34);
        animation: boot-spin 1.2s linear infinite;
      }

      .boot-loader__text {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: rgba(250, 246, 236, 0.78);
      }

      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-label="Loading Cercle planner">
      <div class="boot-loader__inner">
        <div class="boot-loader__mark" aria-hidden="true"></div>
        <div class="boot-loader__text">Cercle · 26</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
