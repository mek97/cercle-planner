<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a14" />
    <meta name="description" content="Fan-made interactive planner for Cercle Festival 2026 — vibe quiz, full timetable, Spotify previews, shareable picks. Not affiliated with Cercle." />
    <!-- GitHub Pages can't serve HTTP response headers, so the CSP and friends
         from vercel.json / public/_headers move into meta. Note: X-Frame-Options
         and HSTS can't be set via meta — accept that trade-off on GH Pages. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://image-cdn-ak.spotifycdn.com https://image-cdn-fa.spotifycdn.com https://i.scdn.co; frame-src https://open.spotify.com; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Cercle Festival 2026 · Planner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
